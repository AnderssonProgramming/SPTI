table inet filter {
        set admin_hosts {
                type ipv4_addr
                elements = { 10.20.0.10 }
        }

        chain input {
                type filter hook input priority filter; policy drop;
                iif "lo" accept
                ct state established,related accept
                ct state invalid drop
                tcp flags ! fin,syn,rst,psh,ack,urg drop
                tcp flags & (fin | syn) == fin | syn drop
                tcp flags & (syn | rst) == syn | rst drop
                tcp dport 22 ct state new limit rate over 3/minute burst 5 packets log prefix "NFT-SSH-RATELIMIT: " drop
                ip saddr @admin_hosts tcp dport 22 accept
                log prefix "NFT-INPUT-DROP: " limit rate 5/minute burst 5 packets
        }

        chain forward {
                type filter hook forward priority filter; policy drop;
                ct state established,related accept
                tcp dport { 80, 443 } ip daddr 10.20.0.10 accept
                log prefix "NFT-FORWARD-DROP: " limit rate 5/minute burst 5 packets
        }

        chain output {
                type filter hook output priority filter; policy accept;
        }
}
